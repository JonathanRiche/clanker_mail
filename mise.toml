[tools]
zig = "0.16"

[tasks.build]
description = "Build the project"
run = "zig build install -Doptimize=ReleaseFast --prefix ${HOME}/.local"

[tasks.deploy]
description = "Deploy the worker with the local deploy config"
run = "cd worker && npx wrangler deploy --config wrangler.deploy.local.jsonc"

